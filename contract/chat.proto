syntax = "proto3";

package chat; //gera chat::


message ChatMessage{
  int32 user_id = 1;
  string user_text = 2;
}

message SendRequest {
  ChatMessage message = 1;
}

message SendResponse {
  bool success = 1;
  string error_msg = 2;
}

message UserIdRequest {
  string name = 1;
}

message UserIdResponse {
  int32 user_id = 1;
}

service ChatService{
  rpc EnviarMensagem(SendRequest) returns (SendResponse);
  rpc EnviarUserId(UserIdRequest) returns (UserIdResponse);
  rpc LerMensagens(UserIdRequest) returns (stream ChatMessage);
}
